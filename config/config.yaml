# Dronomy GPS-denied localization — central configuration.
# Loaded by src/dronomy_loc/config.py. Paths are relative to the repo root.

# ── Input video ───────────────────────────────────────────────────────
video:
  path: "dronomy_video/IE_Challenge_lat43_521955_lon5_624290.MP4"
  # Rough recording location parsed from the filename (lat, lon). Used as the
  # localization prior and to centre the reference-imagery fetch.
  rough_lat: 43.521955
  rough_lon: 5.624290

# ── Frame extraction ──────────────────────────────────────────────────
frames:
  out_dir: "data/frames"
  every_n_seconds: 1.0      # sample 1 frame/sec (set via --fps in the script too)
  max_frames: null          # null = no cap
  resize_long_edge: 1920    # downscale 4K frames for matching speed (null = keep 4K)
  jpeg_quality: 95

# ── Reference satellite imagery ───────────────────────────────────────
reference:
  out_dir: "data/reference"
  provider: "ign"           # "ign" (open-data fallback) | "gee" (Google Earth Engine)
  # Ground footprint of the reference tile to fetch, centred on the rough location.
  span_meters: 1500         # 1.5 km x 1.5 km area
  pixels: 4096              # output raster size (square); ~0.37 m/px at 1500 m span
  # IGN-specific (no API key needed via the Géoplateforme):
  ign:
    wms_url: "https://data.geopf.fr/wms-r/wms"
    layer: "HR.ORTHOIMAGERY.ORTHOPHOTOS"
    image_format: "image/geotiff"   # geotiff carries georeferencing; png/jpeg also work
  # GEE-specific (requires `earthengine authenticate`):
  gee:
    collection: "USDA/NAIP/DOQQ"    # placeholder; for FR use e.g. Sentinel-2 / Esri
    # See src/dronomy_loc/reference/gee.py for the real export logic.

# ── Matching ──────────────────────────────────────────────────────────
matching:
  method: "classical"       # "classical" (SIFT/ORB) | "loftr" | "superglue"
  classical:
    detector: "SIFT"        # SIFT | ORB | AKAZE
    max_features: 8000
    ratio_test: 0.75        # Lowe ratio
  deep:
    model: "loftr"          # kornia LoFTR
    weights: "outdoor"      # LoFTR pretrained variant
    device: "cpu"           # no local CUDA; switch to "cuda" on better hardware
  ransac:
    reproj_threshold_px: 5.0
    confidence: 0.999
    min_inliers: 12

# ── Outputs ───────────────────────────────────────────────────────────
output:
  dir: "data/outputs"
  save_overlays: true
  trajectory_csv: "data/outputs/trajectory.csv"
