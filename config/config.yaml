# Dronomy GPS-denied localization — central configuration.
# Loaded by src/dronomy_loc/config.py. Paths are relative to the repo root.

# ── Input video ───────────────────────────────────────────────────────
video:
  path: "dronomy_video/IE_Challenge_lat43_521955_lon5_624290.MP4"
  # Rough recording location parsed from the filename (lat, lon). Used as the
  # localization prior and to centre the reference-imagery fetch.
  rough_lat: 43.521955
  rough_lon: -5.624290   # NOTE: filename dropped the minus sign. True loc = Asturias, Spain (not France).

# ── Frame extraction ──────────────────────────────────────────────────
frames:
  out_dir: "data/frames"
  every_n_seconds: 1.0      # sample 1 frame/sec (set via --fps in the script too)
  max_frames: null          # null = no cap
  resize_long_edge: 1920    # downscale 4K frames for matching speed (null = keep 4K)
  jpeg_quality: 95
  blur_filter: "sharpest"   # "sharpest" = keep the sharpest frame per window | "off" = plain uniform
  min_blur_var: 0.0         # drop a window only if even its sharpest frame scores below this (0 = never)

# ── Reference satellite imagery ───────────────────────────────────────
reference:
  out_dir: "data/reference"
  provider: "gee"           # "gee" (Google Earth Engine map tiles) | "ign" (France-only, doesn't cover Spain)
  # Ground footprint of the reference tile to fetch, centred on the rough location.
  span_meters: 1500         # 1.5 km x 1.5 km area
  pixels: 4096              # output raster size (square); ~0.37 m/px at 1500 m span
  # IGN-specific (no API key, but FRANCE ONLY — the true location is in Spain, so this won't return imagery):
  ign:
    wms_url: "https://data.geopf.fr/wms-r/wms"
    layer: "HR.ORTHOIMAGERY.ORTHOPHOTOS"
    image_format: "image/geotiff"   # geotiff carries georeferencing; png/jpeg also work
  # GEE-specific. One-time: `earthengine authenticate` + a Cloud project with the Earth Engine API enabled.
  gee:
    project: ""                              # your GEE Cloud project (or set EE_PROJECT env var)
    collection: "COPERNICUS/S2_SR_HARMONIZED"  # Sentinel-2 SR (~10 m/px, global, free)
    start_date: "2023-01-01"
    end_date: "2024-12-31"
    cloud_prop: "CLOUDY_PIXEL_PERCENTAGE"    # per-scene cloud metadata field
    max_cloud_pct: 10                        # drop scenes cloudier than this, then median-composite
    rgb_bands: ["B4", "B3", "B2"]            # true-colour
    vis_min: 0
    vis_max: 3000
    max_zoom: 17                             # cap tile zoom (S2 detail tops out ~zoom 13-14)

# ── Matching ──────────────────────────────────────────────────────────
matching:
  method: "classical"       # "classical" (SIFT/ORB) | "loftr" | "superglue"
  classical:
    detector: "SIFT"        # SIFT | ORB | AKAZE
    max_features: 8000
    ratio_test: 0.75        # Lowe ratio
  deep:
    model: "loftr"          # kornia LoFTR
    weights: "outdoor"      # LoFTR pretrained variant
    device: "cpu"           # no local CUDA; switch to "cuda" on better hardware
  ransac:
    reproj_threshold_px: 5.0
    confidence: 0.999
    min_inliers: 12

# ── Outputs ───────────────────────────────────────────────────────────
output:
  dir: "data/outputs"
  save_overlays: true
  trajectory_csv: "data/outputs/trajectory.csv"
