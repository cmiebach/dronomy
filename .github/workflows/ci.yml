name: CI

# Run the offline test suite on every PR and on pushes to the long-lived branches.
on:
  pull_request:
  push:
    branches: [main, dev]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      # OpenCV (opencv-python, not headless) needs libGL/glib at import time.
      - name: System libs for OpenCV
        run: sudo apt-get update && sudo apt-get install -y libgl1 libglib2.0-0

      - name: Install package + test deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      # The suite is fully offline (synthetic videos, mocked network, no torch),
      # so it runs fast and deterministically on a clean runner.
      - name: Run tests
        run: pytest -q
